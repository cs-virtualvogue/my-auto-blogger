name: AI Auto Blogger

on:
  schedule:
    # รันอัตโนมัติทุกวันจันทร์ เวลา 09:00 น. (เวลาไทย คือ 02:00 UTC)
    - cron: '0 2 * * 1'
  workflow_dispatch: # เปิดให้กดรันแบบ Manual เองได้ตลอดเวลา

jobs:
  run-blog-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-packages: 'pip' # บังคับอัปเดต pip ตัวใหม่ล่าสุด
        cache: 'pip'           # เคลียร์และช่วยจัดการแคชของไลบรารี

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --force-reinstall # บังคับติดตั้งไลบรารีใหม่ทั้งหมด ไม่ใช้ตัวเก่าที่ค้างอยู่ในระบบ

    - name: Run Bot Script
      env:
        BLOG_ID: ${{ secrets.BLOG_ID }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python main.py
